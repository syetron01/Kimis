<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kimis Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2b5876, #4e4376);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #4e4376;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #372d63;
        }

        #message {
            margin-top: 10px;
            font-size: 14px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .checkbox-container input {
            width: auto;
            margin: 0 10px 0 0;
        }

        .links {
            margin-top: 15px;
            font-size: 14px;
        }

        .links a {
            color: #4e4376;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="login-card">
        <h2>Kimis Login</h2>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <div class="checkbox-container">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>
            <button type="submit">Login</button>
        </form>

        <p id="message"></p>

        <div class="links">
            <a href="register.html">Don't have an account? Register here</a>
        </div>
    </div>

    <script>
        // Check if already logged in
        window.onload = function() {
            const token = localStorage.getItem("token") || sessionStorage.getItem("token");
            if (token) {
                // If a token exists, smoothly redirect to dashboard
                window.location.href = "dashboard.html";
            }
        };

        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {

                const res = await fetch("http://localhost:8080/api/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    document.getElementById("message").style.color = "green";
                    document.getElementById("message").innerText = data.message;
                    
                    const rememberMe = document.getElementById("rememberMe").checked;
                    
                    if (data.token) {
                        if (rememberMe) {
                            localStorage.setItem("token", data.token); // Persist across sessions
                        } else {
                            sessionStorage.setItem("token", data.token); // Clear on tab close
                        }
                    }

                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 500);
                } else {
                    document.getElementById("message").style.color = "red";
                    document.getElementById("message").innerText = data.message;
                }

            } catch (error) {
                document.getElementById("message").style.color = "red";
                document.getElementById("message").innerText = "Server not reachable.";
            }

        });

    </script>

</body>

</html>
