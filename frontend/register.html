<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kimis Register</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2b5876, #4e4376);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #4e4376;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #372d63;
        }

        #message {
            margin-top: 10px;
            font-size: 14px;
        }

        .links {
            margin-top: 15px;
            font-size: 14px;
        }

        .links a {
            color: #4e4376;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="login-card">
        <h2>Register</h2>

        <form id="registerForm">
            <input type="text" id="first_name" placeholder="First Name (required)" required>
            <input type="text" id="last_name" placeholder="Last Name">
            <input type="text" id="username" placeholder="Username / Display Name (required)" required>
            <input type="email" id="email" placeholder="Email Address (required)" required>
            
            <input type="password" id="password" placeholder="Password (required)" required minlength="8">
            <input type="password" id="confirm_password" placeholder="Confirm Password (required)" required minlength="8">
            
            <input type="text" id="job_title" placeholder="Job Title / Position (optional)">
            <input type="text" id="department" placeholder="Team / Department (optional)">
            <label for="profile_picture" style="display: block; text-align: left; margin: 10px 0 5px 0; font-size: 14px;">Profile Picture (optional, max 5MB):</label>
            <input type="file" id="profile_picture" accept="image/*">

            <button id="submitBtn" type="submit">Create Account</button>
        </form>

        <p id="message"></p>

        <div class="links">
            <a href="login.html">Already have an account? Login here</a>
        </div>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const messageEl = document.getElementById("message");
            const submitBtn = document.getElementById("submitBtn");

            const first_name = document.getElementById("first_name").value.trim();
            const last_name = document.getElementById("last_name").value.trim();
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirm_password = document.getElementById("confirm_password").value;
            const job_title = document.getElementById("job_title").value.trim();
            const department = document.getElementById("department").value.trim();
            const profile_picture = document.getElementById("profile_picture").files[0];

            if (password.length < 8) {
                messageEl.style.color = "red";
                messageEl.innerText = "Password must be at least 8 characters long.";
                return;
            }

            if (password !== confirm_password) {
                messageEl.style.color = "red";
                messageEl.innerText = "Passwords do not match.";
                return;
            }

            const formData = new FormData();
            formData.append('email', email);
            formData.append('password', password);
            formData.append('first_name', first_name);
            formData.append('last_name', last_name);
            formData.append('username', username);
            formData.append('job_title', job_title);
            formData.append('department', department);
            if (profile_picture) {
                formData.append('profile_picture', profile_picture);
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Creating...";
            messageEl.innerText = "";

            try {
                const res = await fetch("http://localhost:8080/api/register", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                if (res.ok) {
                    messageEl.style.color = "green";
                    messageEl.innerText = data.message + " Redirecting to login...";
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    messageEl.style.color = "red";
                    messageEl.innerText = data.message;
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Create Account";
                }
            } catch (error) {
                messageEl.style.color = "red";
                messageEl.innerText = "Server not reachable.";
                submitBtn.disabled = false;
                submitBtn.innerText = "Create Account";
            }
        });
    </script>

</body>

</html>
