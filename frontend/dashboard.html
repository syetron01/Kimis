<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kimis Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2b5876, #4e4376);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #333;
        }

        .dashboard-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .dashboard-card h2 {
            margin-bottom: 20px;
            color: #2b5876;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #e74c3c;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #c0392b;
        }

        #userInfo {
            text-align: left;
            margin-top: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        #adminPanel {
            display: none; /* Hidden by default */
            margin-top: 20px;
            background: #e8f4f8;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #b3d4fc;
            text-align: left;
        }

        #adminPanel h3 {
            color: #1a4a6e;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .admin-btn {
            background: #2b5876;
        }

        .admin-btn:hover {
            background: #1a3c52;
        }

        #adminResult {
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #333;
            background: #fff;
            padding: 5px;
            border: 1px solid #ccc;
            min-height: 20px;
        }
    </style>

</head>

<body>

    <div class="dashboard-card">
        <h2>Welcome to the Dashboard!</h2>
        <p>You have successfully logged in.</p>

        <div id="userInfo">
            <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
            <p><strong>Role:</strong> <span id="userRole">Loading...</span></p>
        </div>

        <div id="adminPanel">
            <h3>Admin Panel 🛡️</h3>
            <p>You can see this because your role is <strong>admin</strong>.</p>
            <button id="fetchAdminDataBtn" class="admin-btn">Fetch Sensitive Admin Data</button>
            <div id="adminResult">Waiting for request...</div>
        </div>

        <button id="logoutBtn">Logout</button>
    </div>

    <script>
        // Check for token on load
        window.onload = async function() {
            const token = localStorage.getItem("token") || sessionStorage.getItem("token");
            
            if (!token) {
                // Not logged in, redirect
                window.location.href = "login.html";
                return;
            }

            try {
                // Verify token with backend
                const res = await fetch("http://localhost:8080/api/me", {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById("userEmail").innerText = data.email;
                    document.getElementById("userRole").innerText = data.role;

                    // RBAC Logic: If user is an admin, unhide the Admin Panel
                    if (data.role === "admin") {
                        document.getElementById("adminPanel").style.display = "block";
                    }
                } else {
                    // Token invalid or expired
                    localStorage.removeItem("token");
                    sessionStorage.removeItem("token");
                    window.location.href = "login.html";
                }
            } catch (error) {
                console.error("Error verifying token:", error);
                document.getElementById("userEmail").innerText = "Error loading info";
                document.getElementById("userRole").innerText = "Error loading info";
            }
        };

        // Admin functionality
        document.getElementById("fetchAdminDataBtn")?.addEventListener("click", async function() {
            const token = localStorage.getItem("token") || sessionStorage.getItem("token");
            const resultDiv = document.getElementById("adminResult");
            
            resultDiv.innerText = "Fetching...";
            resultDiv.style.color = "#333";

            try {
                const res = await fetch("http://localhost:8080/api/admin-data", {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (res.ok) {
                    const data = await res.json();
                    resultDiv.innerText = JSON.stringify(data, null, 2);
                    resultDiv.style.color = "green";
                } else {
                    const error = await res.json();
                    resultDiv.innerText = `Error: ${error.message} (Status: ${res.status})`;
                    resultDiv.style.color = "red";
                }
            } catch (error) {
                resultDiv.innerText = "Error: Server not reachable.";
                resultDiv.style.color = "red";
            }
        });

        // Logout logic
        document.getElementById("logoutBtn").addEventListener("click", function () {
            localStorage.removeItem("token");
            sessionStorage.removeItem("token");
            window.location.href = "login.html";
        });
    </script>

</body>

</html>
